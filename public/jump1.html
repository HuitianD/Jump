<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Jump Jump · Platform Game</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .game-controls {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      width: 600px;
      margin-bottom: 8px;
    }
    canvas {
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      touch-action: none;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #555;
    }
    .start-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
    }
    .id-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 260px;
      align-items: stretch;
    }
    .id-card label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .id-card input[type="text"] {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .id-card input[type="text"]:focus {
      border-color: #555;
    }
    .id-card .error-hint {
      font-size: 12px;
      color: #ef4444;
      display: none;
    }
    .hidden {
      display: none;
    }
    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #999;
      font-size: 13px;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="wrap hidden">
    <div class="game-controls">
      <button id="pause-btn" class="btn">⏸ Pause</button>
      <button id="restart-btn" class="btn">↺ Restart</button>
    </div>
    <canvas id="game" width="600" height="720" aria-label="Jump a Jump Game"></canvas>
  </div>
  <div id="start-overlay" class="start-overlay">
    <div class="id-card">
      <label id="pid-label" for="pid-input">Participant ID</label>
      <input id="pid-input" type="text" autocomplete="off" spellcheck="false" />
      <span class="error-hint" id="pid-error">Please enter a participant ID.</span>
      <button id="start-btn" class="btn" title="Start Game">Start</button>
    </div>
  </div>
  <div class="toast hidden">Hold (or long press on touch) to charge power, release to jump</div>

  <script>
  (() => {
    'use strict';

    // ===== RESEARCHER CONFIG =====
    const PARTICIPANT_ID_LABEL       = 'Participant ID'; // label shown to participant
    const PARTICIPANT_ID_PLACEHOLDER = 'e.g. P042';      // hint text in the input

    // ===== DOM Elements =====
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const wrap = document.querySelector('.wrap');
    const toast = document.querySelector('.toast');
    const pidInput = document.getElementById('pid-input');
    const pidLabel = document.getElementById('pid-label');
    const pidError = document.getElementById('pid-error');
    const pauseBtn = document.getElementById('pause-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Apply config labels
    pidLabel.textContent = PARTICIPANT_ID_LABEL;
    pidInput.placeholder = PARTICIPANT_ID_PLACEHOLDER;

    // ===== GAME CONFIGURATION =====
    const CONFIG = {
      // Canvas dimensions
      canvas: {
        width: canvas.width,
        height: canvas.height,
      },

      // Platform configuration
      platform: {
        height: 16,           // Vertical size of platform
        minWidth: 70,         // Minimum horizontal size
        maxWidth: 100,        // Maximum horizontal size
        edgeMargin: 40,       // Distance from screen edge to platform edge
        minGap: 220,          // Minimum horizontal distance between platforms
        maxGap: 320,          // Maximum horizontal distance between platforms
        color: '#d0d0d0',     // Platform color
        moving: {
          amplitude: 60,      // Vertical travel distance (px)
          speed: 2.2,         // Oscillation speed (radians per second)
          topMargin: 24,      // Minimum gap from top edge when moving
          bottomMargin: 20,   // Minimum gap from bottom edge when moving
        },
      },

      // Trial configuration
      trials: {
        total: 30,
        phases: [
          {
            start: 1,
            end: 10,
            platformWidth: { min: 120, max: 140 },
            movingTarget: false,
          },
          {
            start: 11,
            end: 20,
            platformWidth: { min: 50, max: 80 },
            movingTarget: false,
          },
          {
            start: 21,
            end: 30,
            platformWidth: { min: 50, max: 80 },
            movingTarget: true,
          },
        ],
      },

      // Player (jumper) configuration
      player: {
        width: 25,            // Horizontal size
        height: 50,           // Vertical size
        color: '#000000',     // Player color
        edgeMargin: 20,       // Initial position margin from left edge
      },

      // Physics configuration
      physics: {
        gravity: 1400,        // Acceleration downward (px/s²)
        maxJumpSpeed: 950,    // Maximum jump velocity (px/s)
        jumpAngle: -Math.PI / 3,  // Jump direction (~60° upward-right)
        chargeCoefficient: 0.011,  // How much charge power affects speed
        chargeGamma: 0.65,    // Non-linear charge curve
      },

      // World configuration
      world: {
        platformYOffset: 140,  // Distance from bottom to platform
        scrollSpeed: 450,      // Platform alignment speed (px/s)
      },

      // Animation configuration
      animation: {
        chargeScale: 0.14,    // Squash effect during charge
        minScaleY: 0.68,      // Minimum vertical compression
        scaleBeta: 0.6,       // Horizontal/vertical relationship
        springOmega: 11,      // Spring oscillation frequency
        springZeta: 0.32,     // Spring damping
      },
    };

    // ===== Calculated Constants =====
    const CANVAS_W = CONFIG.canvas.width;
    const CANVAS_H = CONFIG.canvas.height;
    const PLATFORM_Y = CANVAS_H - CONFIG.world.platformYOffset;
    // Left platform: centered at edgeMargin + half platform width
    const PLATFORM_ANCHOR_X = CONFIG.platform.edgeMargin + CONFIG.platform.minWidth / 2;
    // Right platform: centered at width - edgeMargin - half platform width
    const PLATFORM_RIGHT_CENTER_X = CANVAS_W - CONFIG.platform.edgeMargin - CONFIG.platform.minWidth / 2;
    // Player position: sits on top of platform (not overlapping)
    const PLAYER_INITIAL_Y = PLATFORM_Y - CONFIG.platform.height - CONFIG.player.height / 2;
    const TOTAL_TRIALS = CONFIG.trials.total;

    // ===== Game State =====
    const gameState = {
      trial: 0,                    // Current trial index (0-based)
      successCount: 0,             // Number of successful landings
      failureCount: 0,             // Number of failed attempts
      lastFrameTime: performance.now(),
      gameEnded: false,            // Game ended after reaching TOTAL_TRIALS
      lastLandingTimestamp: performance.now(), // Last moment player was on a platform
      lastPressTimestamp: null,    // Last moment player started charging
      currentTrialRecord: null,    // Timing data for the in-progress jump
      trialRecords: [],            // Collected timing data for completed jumps
      isStarted: false,            // Experiment begins when start button pressed
      isPaused: false,             // True while game is paused mid-trial
      participantId: '',           // Set from the ID input before game starts
    };

    function getTrialDifficulty(trialIndex) {
      const trialNumber = Math.min(Math.max(trialIndex + 1, 1), TOTAL_TRIALS);
      const matchingPhase = CONFIG.trials.phases.find(phase => (
        trialNumber >= phase.start && trialNumber <= phase.end
      ));
      return matchingPhase ?? CONFIG.trials.phases[CONFIG.trials.phases.length - 1];
    }

    // ===== Player Object =====
    const player = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      scaleX: 1,
      scaleY: 1,
      state: 'idle',
      chargeTime: 0,
      spring: {
        active: false,
        time: 0,
        amplitude: 0,
      },

      reset() {
        this.x = PLATFORM_ANCHOR_X;
        this.y = PLAYER_INITIAL_Y;
        this.vx = 0;
        this.vy = 0;
        this.scaleX = 1;
        this.scaleY = 1;
        this.state = 'idle';
        this.chargeTime = 0;
        this.spring.active = false;
        this.spring.time = 0;

        gameState.lastPressTimestamp = null;
        gameState.currentTrialRecord = null;

        // Reset platforms for new trial
        platformManager.reset();
        gameState.lastLandingTimestamp = performance.now();
      },

      startCharging() {
        if (this.state !== 'idle') return;
        const pressTimestamp = performance.now();
        const landingTimestamp = gameState.lastLandingTimestamp ?? null;
        const targetPlatform = platformManager.getTargetPlatform();
        const targetPlatformWidth = targetPlatform ? targetPlatform.width : null;
        const targetPlatformHeight = targetPlatform ? targetPlatform.height : null;
        const startX = this.x;
        const startY = this.y;

        let landingToPress = null;
        if (landingTimestamp !== null) {
          landingToPress = pressTimestamp - landingTimestamp;
        }

        gameState.lastPressTimestamp = pressTimestamp;
        gameState.currentTrialRecord = {
          trial: gameState.trial + 1,
          landingTimestamp,
          pressTimestamp,
          jumpTimestamp: null,
          landingToPressMs: landingToPress,
          pressToJumpMs: null,
          outcome: null,
          postLandingTimestamp: null,
          targetPlatformWidth,
          targetPlatformHeight,
          startX,
          startY,
          landingX: null,
          landingY: null,
        };

        this.state = 'charging';
        this.chargeTime = 0;
      },

      releaseJump() {
        if (this.state !== 'charging') return;

        const jumpTimestamp = performance.now();
        if (gameState.currentTrialRecord) {
          gameState.currentTrialRecord.jumpTimestamp = jumpTimestamp;
          if (gameState.currentTrialRecord.pressTimestamp !== null) {
            gameState.currentTrialRecord.pressToJumpMs =
              jumpTimestamp - gameState.currentTrialRecord.pressTimestamp;
          }
          gameState.trialRecords.push(gameState.currentTrialRecord);
          gameState.currentTrialRecord = null;
        }
        gameState.lastPressTimestamp = null;

        const rawSpeed = CONFIG.physics.chargeCoefficient *
                        Math.pow(this.chargeTime * 1000, CONFIG.physics.chargeGamma) * 1000;
        const speed = Math.min(CONFIG.physics.maxJumpSpeed, rawSpeed);

        this.vx = Math.cos(CONFIG.physics.jumpAngle) * speed;
        this.vy = Math.sin(CONFIG.physics.jumpAngle) * speed;
        this.state = 'jumping';

        this.spring.active = true;
        this.spring.time = 0;
        this.spring.amplitude = (1 - this.scaleY) * 0.95;
      },

      updateCharging(dt) {
        this.chargeTime += dt;

        const t = this.chargeTime;
        const scaleY = Math.max(
          1 - CONFIG.animation.chargeScale * Math.pow(t, CONFIG.physics.chargeGamma),
          CONFIG.animation.minScaleY
        );
        const scaleX = Math.pow(1 / scaleY, CONFIG.animation.scaleBeta);

        this.scaleY = scaleY;
        this.scaleX = scaleX;
      },

      updateJumping(dt) {
        this.vy += CONFIG.physics.gravity * dt;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        const stretchFactor = 1 + clamp(-this.vy / 2400, -0.1, 0.1);
        const airScaleX = stretchFactor;
        const airScaleY = 1 / stretchFactor;

        if (this.spring.active) {
          this.spring.time += dt;
          const { time, amplitude } = this.spring;
          const w = CONFIG.animation.springOmega;
          const z = CONFIG.animation.springZeta;
          const wd = w * Math.sqrt(1 - z * z);

          const rebound = 1 + amplitude * Math.exp(-z * w * time) * Math.cos(wd * time);
          this.scaleY = rebound * airScaleY;
          this.scaleX = Math.pow(1 / rebound, CONFIG.animation.scaleBeta) * airScaleX;

          if (time > 0.85) {
            this.spring.active = false;
            this.scaleX = airScaleX;
            this.scaleY = airScaleY;
          }
        } else {
          this.scaleX = airScaleX;
          this.scaleY = airScaleY;
        }
      },
    };

    // ===== Platform Management =====
    const platformManager = {
      platforms: [],

      reset() {
        this.platforms = [];

        // Create left platform (fixed position at left edge)
        this.platforms.push(this.createPlatform(
          PLATFORM_ANCHOR_X,
          CONFIG.platform.minWidth + 10,
          { enableMotion: false }
        ));

        // Create right platform (fixed position at right edge)
        const upcomingDifficulty = getTrialDifficulty(gameState.trial);
        this.platforms.push(this.createPlatform(
          PLATFORM_RIGHT_CENTER_X,
          this.randomWidth(upcomingDifficulty),
          { enableMotion: upcomingDifficulty.movingTarget }
        ));
      },

      createPlatform(centerX, width, options = {}) {
        const baseY = PLATFORM_Y;
        const motion = options.enableMotion
          ? this.createMotionSettings(baseY, options.motionPreset)
          : null;

        return {
          centerX,
          baseY,
          y: baseY,
          width,
          height: CONFIG.platform.height,
          angle: 0,
          motion,
          get isMoving() { return Boolean(this.motion); },

          get left() { return this.centerX - this.width / 2; },
          get right() { return this.centerX + this.width / 2; },
          get top() { return this.y - this.height; },
          updateMotion(dt, isActive) {
            if (!this.motion) {
              this.y = this.baseY;
              return;
            }
            if (!isActive) {
              this.y = this.baseY;
              return;
            }
            this.motion.phase += dt * this.motion.speed;
            const offset = Math.sin(this.motion.phase) * this.motion.amplitude;
            const intendedY = this.baseY + offset;
            this.y = clamp(intendedY, this.motion.minY, this.motion.maxY);
          },
        };
      },

      createMotionSettings(baseY, override) {
        const motionConfig = override ?? CONFIG.platform.moving;
        const amplitude = motionConfig.amplitude;
        const speed = motionConfig.speed;
        const minY = Math.max(
          CONFIG.platform.height + motionConfig.topMargin,
          baseY - amplitude
        );
        const maxY = Math.min(
          CANVAS_H - motionConfig.bottomMargin,
          baseY + amplitude
        );

        return {
          amplitude,
          speed,
          minY,
          maxY,
          phase: Math.random() * Math.PI * 2,
        };
      },

      randomWidth(difficulty) {
        const { min, max } = difficulty.platformWidth;
        return min + Math.random() * (max - min);
      },

      randomGap() {
        return CONFIG.platform.minGap +
               Math.random() * (CONFIG.platform.maxGap - CONFIG.platform.minGap);
      },

      update(dt) {
        const allowMotion = player.state !== 'scrolling';
        this.platforms.forEach((platform, index) => {
          if (typeof platform.updateMotion === 'function') {
            const shouldAnimate = index !== 0 && allowMotion;
            platform.updateMotion(dt, shouldAnimate);
          }
        });
      },

      getCurrentPlatform() {
        return this.platforms[0];
      },

      getTargetPlatform() {
        return this.platforms[1];
      },

      scrollToAlign(dt) {
        const target = this.getTargetPlatform();
        if (!target) return false;
        const targetCenterX = PLATFORM_ANCHOR_X;

        if (target.centerX > targetCenterX) {
          const distance = CONFIG.world.scrollSpeed * dt;
          const actualMove = Math.min(distance, target.centerX - targetCenterX);

          this.platforms.forEach(p => p.centerX -= actualMove);
          player.x -= actualMove;

          return false;
        } else {
          const snapDelta = targetCenterX - target.centerX;
          this.platforms.forEach(p => p.centerX += snapDelta);
          player.x += snapDelta;

          this.platforms.shift();
          const currentPlatform = this.platforms[0];
          if (currentPlatform && currentPlatform.motion) {
            currentPlatform.y = currentPlatform.baseY;
          }

          const currentPlatformX = this.platforms[0].centerX;
          let newCenterX;

          if (currentPlatformX === PLATFORM_ANCHOR_X) {
            newCenterX = PLATFORM_RIGHT_CENTER_X;
          } else {
            newCenterX = PLATFORM_ANCHOR_X;
          }

          const nextDifficulty = getTrialDifficulty(gameState.trial);
          this.platforms.push(this.createPlatform(
            newCenterX,
            this.randomWidth(nextDifficulty),
            { enableMotion: nextDifficulty.movingTarget }
          ));

          return true;
        }
      },

      checkLanding() {
        const target = this.getTargetPlatform();
        if (!target) return false;
        const playerBottom = player.y + CONFIG.player.height / 2;
        const platformTop = target.top;

        const playerLeft = player.x - CONFIG.player.width / 2;
        const playerRight = player.x + CONFIG.player.width / 2;
        const playerCenter = player.x;

        if (player.vy > 0 && playerBottom >= platformTop) {
          if (
            playerRight >= target.left &&
            playerLeft <= target.right &&
            playerCenter >= target.left &&
            playerCenter <= target.right
          ) {
            gameState.successCount++;
            gameState.trial++;
            const landingTimestamp = performance.now();
            const landingX = player.x;
            const landingY = player.y;
            gameState.lastLandingTimestamp = landingTimestamp;
            const latestRecord = gameState.trialRecords[gameState.trialRecords.length - 1];
            if (latestRecord && latestRecord.outcome === null) {
              latestRecord.outcome = 'success';
              latestRecord.postLandingTimestamp = landingTimestamp;
              latestRecord.landingX = landingX;
              latestRecord.landingY = landingY;
            }

            player.y = PLATFORM_Y - CONFIG.platform.height - CONFIG.player.height / 2;
            player.vx = 0;
            player.vy = 0;
            player.scaleX = 1;
            player.scaleY = 1;
            return true;
          }
        }

        if (player.vy > 0 && player.y > CANVAS_H + 100) {
          if (gameState.trial < TOTAL_TRIALS) {
            gameState.failureCount++;
            gameState.trial++;
            const latestRecord = gameState.trialRecords[gameState.trialRecords.length - 1];
            if (latestRecord && latestRecord.outcome === null) {
              latestRecord.outcome = 'failure';
              latestRecord.postLandingTimestamp = null;
            }
            player.reset();
          }
          return false;
        }

        return false;
      },

      checkFailure() {
        const target = this.getTargetPlatform();
        return player.y > CANVAS_H + 100 ||
               (player.vy > 0 && player.y > target.y + 100);
      },
    };

    // ===== Utility Functions =====
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    // ===== Results Submission =====
    async function submitResultsToServer() {
      if (gameState.trialRecords.length < TOTAL_TRIALS) {
        console.warn('Incomplete session — not submitting.');
        return;
      }

      const payload = {
        participantId: gameState.participantId,
        submittedAt: new Date().toISOString(),
        successCount: gameState.successCount,
        failureCount: gameState.failureCount,
        totalTrials: TOTAL_TRIALS,
        successRate: gameState.successCount / TOTAL_TRIALS,
        trials: gameState.trialRecords,
      };

      try {
        const response = await fetch('http://localhost:3000/api/save-results', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const err = await response.text();
          alert(`Server error (${response.status}): ${err}`);
          return;
        }

        const data = await response.json();
        alert(`Results saved! Session ID: ${data.sessionId}`);
      } catch (e) {
        alert('Could not reach the server. Make sure it is running at http://localhost:3000');
      }
    }

    // ===== Game Loop =====
    function update(dt) {
      if (gameState.gameEnded || !gameState.isStarted) return;

      platformManager.update(dt);

      switch (player.state) {
        case 'charging':
          player.updateCharging(dt);
          break;

        case 'jumping':
          player.updateJumping(dt);

          if (platformManager.checkLanding()) {
            player.state = 'scrolling';
          } else if (player.y > CANVAS_H + 100) {
            if (gameState.trial < TOTAL_TRIALS) {
              gameState.failureCount++;
              gameState.trial++;
              const latestRecord = gameState.trialRecords[gameState.trialRecords.length - 1];
              if (latestRecord && latestRecord.outcome === null) {
                latestRecord.outcome = 'failure';
                latestRecord.postLandingTimestamp = null;
              }
              player.reset();
            }
          }
          break;

        case 'scrolling':
          const alignmentComplete = platformManager.scrollToAlign(dt);
          if (alignmentComplete) {
            player.state = 'idle';
          }
          break;
      }

      if (gameState.trial >= TOTAL_TRIALS && !gameState.gameEnded) {
        gameState.gameEnded = true;
        gameState.isStarted = false;
        submitResultsToServer();
        showStartOverlay('Start Again');
      }
    }

    function render() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      renderPlatforms();
      renderPlayer();

      if (player.state === 'dead') {
        renderGameOver();
      }
    }

    function renderPlatforms() {
      ctx.fillStyle = CONFIG.platform.color;
      platformManager.platforms.forEach(platform => {
        ctx.fillRect(platform.left, platform.top, platform.width, platform.height);
      });
    }

    function renderPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.scale(player.scaleX, player.scaleY);

      ctx.fillStyle = CONFIG.player.color;
      const w = CONFIG.player.width;
      const h = CONFIG.player.height;
      ctx.fillRect(-w / 2, -h / 2, w, h);

      ctx.restore();
    }

    function renderGameOver() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.fillStyle = '#000000';
      ctx.font = '700 32px ui-sans-serif, system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', CANVAS_W / 2, CANVAS_H / 2 - 20);

      ctx.font = '600 16px ui-sans-serif, system-ui';
      ctx.fillText('Press Start to play again', CANVAS_W / 2, CANVAS_H / 2 + 30);
    }

    // ===== Input Handling =====
    function handlePointerDown(e) {
      if (!gameState.isStarted) return;
      if (player.state === 'idle') {
        player.startCharging();
      }
    }

    function handlePointerUp(e) {
      if (!gameState.isStarted) return;
      if (player.state === 'charging') {
        player.releaseJump();
      }
    }

    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);
    canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

    // ===== Game Control =====
    function resetGame() {
      gameState.trial = 0;
      gameState.successCount = 0;
      gameState.failureCount = 0;
      gameState.gameEnded = false;
      gameState.trialRecords = [];
      gameState.currentTrialRecord = null;
      gameState.lastPressTimestamp = null;
      gameState.lastFrameTime = performance.now();
      gameState.isStarted = false;
      gameState.isPaused = false;
      pauseBtn.textContent = '⏸ Pause';
      player.reset();
    }

    function showStartOverlay(label) {
      if (label) {
        startBtn.textContent = label;
      }
      startOverlay.classList.remove('hidden');
      if (wrap) wrap.classList.add('hidden');
      if (toast) toast.classList.add('hidden');
    }

    function hideStartOverlay() {
      startOverlay.classList.add('hidden');
      if (wrap) wrap.classList.remove('hidden');
      if (toast) toast.classList.remove('hidden');
    }

    function startGame() {
      const id = pidInput.value.trim();
      if (!id) {
        pidError.style.display = 'block';
        pidInput.focus();
        return;
      }
      pidError.style.display = 'none';
      resetGame();
      gameState.participantId = id;
      gameState.isStarted = true;
      gameState.lastFrameTime = performance.now();
      hideStartOverlay();
    }

    startBtn.addEventListener('click', startGame);
    pidInput.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });

    pauseBtn.addEventListener('click', () => {
      if (!gameState.isStarted) return;
      gameState.isPaused = !gameState.isPaused;
      if (gameState.isPaused) {
        pauseBtn.textContent = '▶ Resume';
      } else {
        // Reset lastFrameTime so dt doesn't spike after a long pause
        gameState.lastFrameTime = performance.now();
        pauseBtn.textContent = '⏸ Pause';
      }
    });

    restartBtn.addEventListener('click', () => {
      if (!gameState.isStarted) return;
      // Discard all in-progress data — never sent to server
      resetGame();
      showStartOverlay('Start');
    });

    // ===== Main Loop =====
    function gameLoop(currentTime) {
      const dt = Math.min(0.033, (currentTime - gameState.lastFrameTime) / 1000);
      gameState.lastFrameTime = currentTime;

      if (!gameState.isPaused && player.state !== 'dead') {
        update(dt);
      }
      render();

      requestAnimationFrame(gameLoop);
    }

    // ===== Start Game =====
    resetGame();
    showStartOverlay('Start');
    requestAnimationFrame(gameLoop);
  })();
  </script>
</body>
</html>
