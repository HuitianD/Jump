<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jump Game · Replay Viewer</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel-border: #d7e0ea;
      --ink: #112031;
      --muted: #5f7285;
      --accent: #f97316;
      --accent-strong: #ea580c;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 20px 50px rgba(17, 32, 49, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.08), transparent 24%),
        linear-gradient(180deg, #f9fbfd 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    body {
      padding: 24px;
      overflow-x: hidden;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .header-card,
    .toolbar-card,
    .stage-card,
    .stats-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header-card {
      padding: 22px 24px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .subhead {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 760px;
    }

    .toolbar-card {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    input[type="text"],
    select {
      height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid #c7d3df;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: #7ea6c8;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .search-input { width: 220px; }
    .session-select { flex: 1 1 380px; min-width: 260px; }

    .btn {
      height: 42px;
      padding: 0 16px;
      border: none;
      border-radius: 12px;
      background: #20354a;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.01em;
      white-space: nowrap;
      transition: transform 0.15s, background 0.15s, opacity 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: #2c4660;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid #c7d3df;
    }

    .btn-ghost:hover:not(:disabled) {
      background: rgba(17, 32, 49, 0.04);
    }

    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      min-height: 42px;
      padding: 0 4px;
    }

    .speed-wrap input[type="range"] {
      width: 130px;
    }

    #speed-label {
      min-width: 28px;
      text-align: right;
      font-size: 13px;
      font-weight: 800;
    }

    #search-count {
      font-size: 13px;
      color: var(--muted);
      margin-left: auto;
    }

    .error-banner {
      display: none;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #be123c;
      font-size: 14px;
      font-weight: 600;
    }

    /* ── Two-column layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 680px) minmax(260px, 1fr);
      gap: 16px;
      align-items: start;
    }

    /* ── Stage card ── */
    .stage-card {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .stage-top {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-line {
      font-size: 14px;
      color: var(--muted);
      margin-left: auto;
      text-align: right;
    }

    .canvas-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(240,246,251,0.95) 100%);
      border-radius: 18px;
      border: 1px solid #dde6ef;
      padding: 10px;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px 12px 0 0;
      border: 2px solid #dde6ef;
    }

    .progress-track {
      width: 100%;
      max-width: 600px;
      height: 8px;
      margin: 0 auto;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      background: #dfe8f1;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fb923c 0%, #f97316 100%);
      transition: width 0.2s ease;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    /* ── Stats card ── */
    .stats-card {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border-radius: 14px;
      border: 1px solid #dde6ef;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(244,247,250,0.96) 100%);
      padding: 14px 12px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 800;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      #search-count {
        margin-left: 0;
      }

      .status-line {
        width: 100%;
        margin-left: 0;
        text-align: left;
      }
    }

    @media (max-width: 720px) {
      body { padding: 16px; }

      .toolbar-row,
      .action-row,
      .stage-top {
        align-items: stretch;
      }

      .search-input,
      .session-select,
      .btn,
      .btn-ghost {
        width: 100%;
      }

      .speed-wrap {
        width: 100%;
        margin-left: 0;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <section class="header-card">
      <h1>Jump Game — Replay Viewer</h1>
      <p class="subhead">Load a saved session and watch the replay at your chosen speed.</p>
    </section>

    <div class="error-banner" id="error-banner"></div>

    <section class="toolbar-card">
      <div class="toolbar-row">
        <label id="pid-search-label" for="pid-search">Participant ID</label>
        <input id="pid-search" class="search-input" type="text" placeholder="e.g. P042" autocomplete="off" spellcheck="false" />
        <button id="search-btn" class="btn">Search</button>
        <button id="show-all-btn" class="btn btn-ghost">Show All</button>
        <span id="search-count"></span>
      </div>

      <div class="toolbar-row">
        <select id="session-select" class="session-select"><option value="">Loading sessions…</option></select>
        <button class="btn" id="load-btn" disabled>Load &amp; Watch</button>
        <div class="speed-wrap">
          <label for="speed-slider">Speed</label>
          <input type="range" id="speed-slider" min="0" max="3" step="1" value="1" />
          <span id="speed-label">1×</span>
        </div>
      </div>
    </section>

    <div class="main-grid">
      <section class="stage-card">
        <div class="stage-top">
          <span class="status-line" id="status-text">No session loaded</span>
        </div>

        <div class="canvas-shell">
          <canvas id="game" width="600" height="720" aria-label="Jump game replay"></canvas>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="action-row">
          <button class="btn" id="play-btn"    disabled>Play</button>
          <button class="btn" id="pause-btn"   disabled>Pause</button>
          <button class="btn btn-ghost" id="restart-btn" disabled>Restart</button>
        </div>
      </section>

      <aside class="stats-card">
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Successes</div>
            <div class="stat-value" id="stat-success">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Failures</div>
            <div class="stat-value" id="stat-failure">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg Reaction</div>
            <div class="stat-value" id="stat-reaction">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg Charge</div>
            <div class="stat-value" id="stat-charge">—</div>
          </div>
        </div>
      </aside>
    </div>

  </div>

<script>
(() => {
  'use strict';

  // ── RESEARCHER CONFIG — must match jump1.html ────────────────────────────
  const PARTICIPANT_ID_LABEL = 'Participant ID'; // change to match your study

  // ── DOM ──────────────────────────────────────────────────────────────────
  const canvas      = document.getElementById('game');
  const ctx         = canvas.getContext('2d');
  const sessionSel  = document.getElementById('session-select');
  const loadBtn     = document.getElementById('load-btn');
  const pidSearchLabel = document.getElementById('pid-search-label');
  const pidSearch   = document.getElementById('pid-search');
  const searchBtn   = document.getElementById('search-btn');
  const showAllBtn  = document.getElementById('show-all-btn');
  const searchCount = document.getElementById('search-count');

  // Apply config label
  pidSearchLabel.textContent = PARTICIPANT_ID_LABEL;
  const speedSlider = document.getElementById('speed-slider');
  const speedLabel  = document.getElementById('speed-label');
  const playBtn     = document.getElementById('play-btn');
  const pauseBtn    = document.getElementById('pause-btn');
  const restartBtn  = document.getElementById('restart-btn');
  const statusText  = document.getElementById('status-text');
  const progressFill = document.getElementById('progress-fill');
  const errorBanner = document.getElementById('error-banner');

  // ── CONFIG (exact copy from jump1.html) ──────────────────────────────────
  const CANVAS_W = 600;
  const CANVAS_H = 720;
  const PLATFORM_Y          = CANVAS_H - 140;            // 580
  const CURRENT_PLATFORM_W  = 80;
  const PLATFORM_ANCHOR_X   = 40 + CURRENT_PLATFORM_W / 2;
  const PLATFORM_RIGHT_CENTER_X = CANVAS_W - 40 - CURRENT_PLATFORM_W / 2;
  const PLAYER_INITIAL_Y    = PLATFORM_Y - 16 - 50 / 2;  // 539
  const TOTAL_TRIALS        = 18;

  const PHYSICS = {
    gravity:           1400,
    maxJumpSpeed:       950,
    jumpAngle:         -Math.PI / 3,
    chargeCoefficient:  0.011,
    chargeGamma:        0.65,
  };
  const ANIM = {
    chargeScale: 0.14,
    minScaleY:   0.68,
    scaleBeta:   0.6,
    springOmega: 11,
    springZeta:  0.32,
  };
  const PLATFORM_H     = 16;
  const PLATFORM_COLOR = '#d0d0d0';
  const PLAYER_W       = 25;
  const PLAYER_H       = 50;
  const SCROLL_SPEED   = 450;

  const MOVING_CFG = {
    vertical: { amplitude: 62, speed: 2.15 },
    horizontal: { amplitude: 56, speed: 1.65 },
  };

  const PHASES = [
    {
      start: 1,
      end: 3,
      platformWidth: { min: 132, max: 150 },
      targetLayout: 'single',
      motionType: 'none',
    },
    {
      start: 4,
      end: 6,
      platformWidth: { min: 102, max: 120 },
      targetLayout: 'single',
      motionType: 'none',
    },
    {
      start: 7,
      end: 9,
      platformWidth: { min: 94, max: 112 },
      targetLayout: 'single',
      motionType: 'vertical',
    },
    {
      start: 10,
      end: 12,
      platformWidth: { min: 92, max: 110 },
      targetLayout: 'single',
      motionType: 'horizontal',
    },
    {
      start: 13,
      end: 15,
      platformWidth: { min: 84, max: 100 },
      targetLayout: 'dual',
      motionType: 'none',
      dualXOffset: 150,
    },
    {
      start: 16,
      end: 18,
      platformWidth: { min: 78, max: 94 },
      targetLayout: 'dual',
      motionType: 'vertical',
      dualXOffset: 120,
    },
  ];

  const SPEED_OPTIONS = [0.5, 1, 2, 3];

  // ── Utility ──────────────────────────────────────────────────────────────
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  function phaseFor(trialIndex) {
    const n = clamp(trialIndex + 1, 1, TOTAL_TRIALS);
    return PHASES.find(p => n >= p.start && n <= p.end) ?? PHASES[PHASES.length - 1];
  }

  function seededUnit(trialIndex) {
    const value = Math.sin((trialIndex + 1) * 12.9898) * 43758.5453;
    return value - Math.floor(value);
  }

  function widthForTrial(trialIndex, fallbackWidth) {
    if (Number.isFinite(fallbackWidth) && fallbackWidth > 10) return fallbackWidth;
    const phase = phaseFor(trialIndex);
    const { min, max } = phase.platformWidth;
    if (max <= min) return min;
    return min + seededUnit(trialIndex) * (max - min);
  }

  function avg(arr) {
    if (!arr.length) return '—';
    return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
  }

  // ── Replay state ─────────────────────────────────────────────────────────
  const RS = {
    active:       false,
    paused:       false,
    currentTrial: 0,
    speed:        1,
    session:      null,
    pendingOutcome: null,
    lastOutcome:  null,   // 'success' | 'failure' | null — shown top-right
  };

  // Pause/resume via promise
  let _unpauseResolve = null;

  function pauseIfNeeded() {
    if (!RS.paused) return Promise.resolve();
    return new Promise(resolve => { _unpauseResolve = resolve; });
  }

  function doUnpause() {
    RS.paused = false;
    if (_unpauseResolve) { _unpauseResolve(); _unpauseResolve = null; }
  }

  // Abortable sleep: wall-clock ms, respects pause and active flag
  async function sleep(ms) {
    if (ms <= 0) return;
    const wall = ms / RS.speed;
    const end = performance.now() + wall;
    while (performance.now() < end) {
      if (!RS.active) return;
      await pauseIfNeeded();
      await new Promise(r => setTimeout(r, 10));
    }
  }

  // Wait until predicate returns true (or replay aborted)
  async function waitUntil(pred) {
    while (!pred() && RS.active) {
      await pauseIfNeeded();
      await new Promise(r => setTimeout(r, 10));
    }
  }

  // Trial-done signal (set before starting jump, resolved by game loop)
  let _trialDoneResolve = null;

  function armTrialDone() {
    return new Promise(resolve => { _trialDoneResolve = resolve; });
  }

  function fireTrialDone(outcome) {
    if (_trialDoneResolve) {
      const r = _trialDoneResolve;
      _trialDoneResolve = null;
      r(outcome);
    }
  }

  function abortReplay() {
    RS.active = false;
    RS.pendingOutcome = null;
    doUnpause();
    fireTrialDone('abort');
  }

  // ── Player ───────────────────────────────────────────────────────────────
  const player = {
    x: PLATFORM_ANCHOR_X, y: PLAYER_INITIAL_Y,
    vx: 0, vy: 0,
    scaleX: 1, scaleY: 1,
    state: 'idle',        // idle | charging | jumping | scrolling
    chargeTime: 0,
    spring: { active: false, time: 0, amplitude: 0 },

    respawn() {
      this.x = PLATFORM_ANCHOR_X;
      this.y = PLAYER_INITIAL_Y;
      this.vx = 0; this.vy = 0;
      this.scaleX = 1; this.scaleY = 1;
      this.state = 'idle';
      this.chargeTime = 0;
      this.spring.active = false;
      this.spring.time = 0;
      this.spring.amplitude = 0;
    },

    resetPosition() {
      this.respawn();
    },

    updateCharging(dt) {
      this.chargeTime += dt;
      const sy = Math.max(
        1 - ANIM.chargeScale * Math.pow(this.chargeTime, PHYSICS.chargeGamma),
        ANIM.minScaleY
      );
      this.scaleY = sy;
      this.scaleX = Math.pow(1 / sy, ANIM.scaleBeta);
    },

    updateJumping(dt) {
      this.vy += PHYSICS.gravity * dt;
      this.x  += this.vx * dt;
      this.y  += this.vy * dt;

      const sf = 1 + clamp(-this.vy / 2400, -0.1, 0.1);

      if (this.spring.active) {
        this.spring.time += dt;
        const { time, amplitude } = this.spring;
        const w  = ANIM.springOmega, z = ANIM.springZeta;
        const wd = w * Math.sqrt(1 - z * z);
        const r  = 1 + amplitude * Math.exp(-z * w * time) * Math.cos(wd * time);
        this.scaleY = r / sf;
        this.scaleX = Math.pow(1 / r, ANIM.scaleBeta) * sf;
        if (time > 0.85) {
          this.spring.active = false;
          this.scaleX = sf; this.scaleY = 1 / sf;
        }
      } else {
        this.scaleX = sf; this.scaleY = 1 / sf;
      }
    },
  };

  // ── Platforms ────────────────────────────────────────────────────────────
  function makePlatform(centerX, baseY, width, phaseOffset = 0) {
    return {
      baseCenterX: centerX,
      centerX,
      width,
      height: PLATFORM_H,
      baseY,
      y: baseY,
      phaseOffset,
      get left()  { return this.centerX - this.width / 2; },
      get right() { return this.centerX + this.width / 2; },
      get top()   { return this.y - this.height; },
    };
  }

  let platList = [];
  let motionGroup = null;
  let scrollAnchor = null;

  function createMotionGroup(phase, trialIndex) {
    if (phase.motionType === 'none') return null;

    const seededPhase = seededUnit(trialIndex) * Math.PI * 2;
    if (phase.motionType === 'vertical') {
      return {
        type: 'vertical',
        phase: seededPhase,
        amplitude: MOVING_CFG.vertical.amplitude,
        speed: MOVING_CFG.vertical.speed,
      };
    }

    return {
      type: 'horizontal',
      phase: seededPhase,
      amplitude: MOVING_CFG.horizontal.amplitude,
      speed: MOVING_CFG.horizontal.speed,
    };
  }

  function updateMotionPositions() {
    const targets = platList.slice(1);
    if (!motionGroup) {
      targets.forEach(platform => {
        platform.centerX = platform.baseCenterX;
        platform.y = platform.baseY;
      });
      return;
    }

    targets.forEach(platform => {
      const offset = Math.sin(motionGroup.phase + (platform.phaseOffset ?? 0)) * motionGroup.amplitude;
      platform.centerX = platform.baseCenterX + (motionGroup.type === 'horizontal' ? offset : 0);
      platform.y = platform.baseY + (motionGroup.type === 'vertical' ? offset : 0);
    });
  }

  function getPrimaryTarget() {
    return platList[1] ?? null;
  }

  function getTargetPlatforms() {
    return platList.slice(1);
  }

  function setupPlatforms(trialIndex, targetWidth) {
    const phase = phaseFor(trialIndex);
    const resolvedWidth = widthForTrial(trialIndex, targetWidth);

    platList = [
      makePlatform(PLATFORM_ANCHOR_X, PLATFORM_Y, CURRENT_PLATFORM_W),
    ];

    if (phase.targetLayout === 'dual') {
      const dualXOffset = phase.dualXOffset ?? 120;
      platList.push(
        makePlatform(PLATFORM_RIGHT_CENTER_X - dualXOffset, PLATFORM_Y, resolvedWidth, 0),
        makePlatform(PLATFORM_RIGHT_CENTER_X, PLATFORM_Y, resolvedWidth, Math.PI * 0.6)
      );
    } else {
      platList.push(makePlatform(PLATFORM_RIGHT_CENTER_X, PLATFORM_Y, resolvedWidth));
    }

    motionGroup = createMotionGroup(phase, trialIndex);
    scrollAnchor = getPrimaryTarget();
    updateMotionPositions();
  }

  function updatePlatforms(dt) {
    if (motionGroup && player.state !== 'scrolling') {
      motionGroup.phase += dt * motionGroup.speed;
    }
    updateMotionPositions();
  }

  function checkLanding() {
    if (player.vy <= 0) return false;

    const playerBottom = player.y + PLAYER_H / 2;
    const playerLeft = player.x - PLAYER_W / 2;
    const playerRight = player.x + PLAYER_W / 2;

    for (const target of getTargetPlatforms()) {
      if (playerBottom < target.top) continue;

      if (
        playerRight >= target.left &&
        playerLeft <= target.right &&
        player.x >= target.left &&
        player.x <= target.right
      ) {
        scrollAnchor = target;
        player.y  = target.top - PLAYER_H / 2;
        player.vx = 0;
        player.vy = 0;
        player.scaleX = 1;
        player.scaleY = 1;
        return true;
      }
    }

    return false;
  }

  function checkFailure() {
    const targets = getTargetPlatforms();
    const targetDepth = targets.length
      ? Math.max(...targets.map(target => target.y))
      : PLATFORM_Y;

    return player.y > CANVAS_H + 100 ||
           (player.vy > 0 && player.y > targetDepth + 120);
  }

  function shiftPlatforms(deltaX) {
    platList.forEach(platform => {
      platform.baseCenterX += deltaX;
      platform.centerX += deltaX;
    });
    player.x += deltaX;
  }

  function scrollStep(dt) {
    const tgt = scrollAnchor || getPrimaryTarget();
    if (!tgt) return true;
    const diff = tgt.centerX - PLATFORM_ANCHOR_X;
    if (diff > 0) {
      const move = Math.min(SCROLL_SPEED * dt, diff);
      shiftPlatforms(-move);
      return false;
    }

    const snap = PLATFORM_ANCHOR_X - tgt.centerX;
    shiftPlatforms(snap);
    scrollAnchor = null;
    return true;
  }

  // ── Game loop ─────────────────────────────────────────────────────────────
  let lastT = performance.now();

  function update(dt) {
    updatePlatforms(dt);
    switch (player.state) {
      case 'charging':
        player.updateCharging(dt);
        break;

      case 'jumping':
        player.updateJumping(dt);
        if (checkLanding()) {
          player.state = 'scrolling';
        } else if (checkFailure()) {
          RS.pendingOutcome = 'failure';
          scrollAnchor = getPrimaryTarget();
          player.state = 'scrolling';
        }
        break;

      case 'scrolling':
        if (scrollStep(dt)) {
          const outcome = RS.pendingOutcome ?? 'success';
          RS.pendingOutcome = null;
          player.respawn();
          fireTrialDone(outcome);
        }
        break;
    }
  }

  function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Platforms
    ctx.fillStyle = PLATFORM_COLOR;
    platList.forEach(p => ctx.fillRect(p.left, p.top, p.width, p.height));

    // Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(player.scaleX, player.scaleY);
    ctx.fillStyle = '#000';
    ctx.fillRect(-PLAYER_W / 2, -PLAYER_H / 2, PLAYER_W, PLAYER_H);
    ctx.restore();

    // ── Overlay (only when a session is loaded) ──
    if (RS.session) {
      const trial = RS.currentTrial;

      // Top-left: trial counter
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.font = 'bold 16px ui-sans-serif, system-ui';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Trial ${trial} / ${TOTAL_TRIALS}`, 12, 10);

      // Top-right: outcome icon
      if (RS.lastOutcome) {
        ctx.font = 'bold 22px ui-sans-serif, system-ui';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle = RS.lastOutcome === 'success' ? '#22c55e' : '#ef4444';
        ctx.fillText(RS.lastOutcome === 'success' ? '✓' : '✗', CANVAS_W - 12, 10);
      }
    }
  }

  function gameLoop(now) {
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    if (RS.active && !RS.paused) update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }
  requestAnimationFrame(gameLoop);

  // ── Replay sequence ───────────────────────────────────────────────────────
  async function replaySession(trials) {
    RS.active = true;
    RS.lastOutcome = null;

    for (let i = 0; i < trials.length; i++) {
      if (!RS.active) break;

      const rec = trials[i];
      RS.currentTrial = i + 1;
      progressFill.style.width = `${(i / TOTAL_TRIALS) * 100}%`;
      statusText.textContent = `Trial ${i + 1} / ${TOTAL_TRIALS}`;

      // 1. Setup
      const targetWidth = widthForTrial(i, rec.targetPlatformWidth);
      setupPlatforms(i, targetWidth);
      player.resetPosition();

      // 2. Idle wait (landingToPressMs)
      await sleep(rec.landingToPressMs ?? 500);
      if (!RS.active) break;

      // 3. Charge
      player.state = 'charging';
      player.chargeTime = 0;
      player.scaleX = 1; player.scaleY = 1;
      await sleep(rec.pressToJumpMs ?? 100);
      if (!RS.active) break;

      // 4. Jump — arm signal BEFORE changing state
      const trialDone = armTrialDone();
      const chargeTime = (rec.pressToJumpMs ?? 100) / 1000;
      const rawSpeed   = PHYSICS.chargeCoefficient *
                         Math.pow(chargeTime * 1000, PHYSICS.chargeGamma) * 1000;
      const jumpSpeed  = Math.min(PHYSICS.maxJumpSpeed, rawSpeed);
      player.vx = Math.cos(PHYSICS.jumpAngle) * jumpSpeed;
      player.vy = Math.sin(PHYSICS.jumpAngle) * jumpSpeed;
      player.state = 'jumping';
      player.spring.active    = true;
      player.spring.time      = 0;
      player.spring.amplitude = (1 - player.scaleY) * 0.95;

      // 5. Wait for physics to resolve
      const outcome = await trialDone;
      if (outcome === 'abort' || !RS.active) break;

      // outcome 'success': scrollToAlign already finished (fired after scroll)
      RS.lastOutcome = outcome;

      // 6. Inter-trial gap
      await sleep(600);
    }

    if (RS.active) {
      // Completed all trials normally
      RS.currentTrial = TOTAL_TRIALS;
      progressFill.style.width = '100%';
      statusText.textContent = 'Replay complete';
    }
    RS.active = false;
    setPlaybackUI(false, true);
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setPlaybackUI(playing, finished) {
    playBtn.disabled    = playing;
    pauseBtn.disabled   = !playing;
    restartBtn.disabled = !playing && !finished;
    if (finished && !playing) {
      playBtn.textContent = 'Replay';
      playBtn.disabled = false;
    }
  }

  function showStats(session) {
    document.getElementById('stat-success').textContent  = session.successCount ?? '—';
    document.getElementById('stat-failure').textContent  = session.failureCount ?? '—';
    const trials = (session.trials || []).slice(0, TOTAL_TRIALS);
    const reactions = trials.map(t => t.landingToPressMs).filter(v => v != null);
    const charges   = trials.map(t => t.pressToJumpMs).filter(v => v != null);
    document.getElementById('stat-reaction').textContent = avg(reactions);
    document.getElementById('stat-charge').textContent   = avg(charges);
  }

  function startReplay() {
    if (!RS.session) return;
    RS.paused = false;
    RS.pendingOutcome = null;
    RS.lastOutcome = null;
    RS.currentTrial = 0;
    progressFill.style.width = '0%';
    player.resetPosition();
    setupPlatforms(0, widthForTrial(0));
    setPlaybackUI(true, false);
    playBtn.textContent = 'Playing…';
    replaySession((RS.session.trials || []).slice(0, TOTAL_TRIALS));
  }

  // ── Speed slider ──────────────────────────────────────────────────────────
  speedSlider.addEventListener('input', () => {
    RS.speed = SPEED_OPTIONS[+speedSlider.value];
    speedLabel.textContent = RS.speed + '×';
  });

  // ── Load & Watch ──────────────────────────────────────────────────────────
  loadBtn.addEventListener('click', async () => {
    const id = sessionSel.value;
    if (!id) return;
    loadBtn.disabled = true;
    loadBtn.textContent = 'Loading…';
    try {
      const res = await fetch(`http://localhost:3000/api/results/${id}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const session = await res.json();

      abortReplay();                // stop any running replay
      RS.session = session;
      RS.currentTrial = 0;
      RS.lastOutcome  = null;

      showStats(session);
      progressFill.style.width = '0%';
      player.resetPosition();
      setupPlatforms(0, widthForTrial(0));

      playBtn.textContent = 'Play';
      playBtn.disabled    = false;
      pauseBtn.disabled   = true;
      restartBtn.disabled = true;
      statusText.textContent = 'Ready — press Play';
    } catch (e) {
      alert('Failed to load session: ' + e.message);
    } finally {
      loadBtn.disabled = false;
      loadBtn.textContent = 'Load & Watch';
    }
  });

  // ── Play ──────────────────────────────────────────────────────────────────
  playBtn.addEventListener('click', () => {
    abortReplay();
    // Give the abort a tick to propagate, then start fresh
    setTimeout(startReplay, 50);
  });

  // ── Pause / Resume ────────────────────────────────────────────────────────
  pauseBtn.addEventListener('click', () => {
    if (RS.paused) {
      doUnpause();
      pauseBtn.textContent = 'Pause';
      statusText.textContent = `Trial ${RS.currentTrial} / ${TOTAL_TRIALS}`;
    } else {
      RS.paused = true;
      pauseBtn.textContent = 'Resume';
      statusText.textContent = 'Paused';
    }
  });

  // ── Restart ───────────────────────────────────────────────────────────────
  restartBtn.addEventListener('click', () => {
    abortReplay();
    setTimeout(startReplay, 60);
  });

  // ── Session store + dropdown helpers ─────────────────────────────────────
  let allSessions = [];

  function optionText(s, totalCount) {
    const idx  = allSessions.indexOf(s);
    const num  = totalCount - idx;
    const pid  = s.participantId ? `[${s.participantId}]` : '[no ID]';
    const date = new Date(s.submittedAt).toLocaleString();
    const pct  = Math.round((s.successRate ?? 0) * 100);
    const total = s.totalTrials ?? s.trials?.length ?? TOTAL_TRIALS;
    return `${pid} — Session #${num} — ${date} — ${s.successCount}/${total} success — ${pct}%`;
  }

  function populateDropdown(subset) {
    sessionSel.innerHTML = '';
    if (subset.length === 0) {
      sessionSel.innerHTML = '<option value="">No matching sessions</option>';
      loadBtn.disabled = true;
      searchCount.textContent = '0 sessions';
      return;
    }
    subset.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s._id;
      opt.textContent = optionText(s, allSessions.length);
      sessionSel.appendChild(opt);
    });
    loadBtn.disabled = false;
    searchCount.textContent = `${subset.length} session${subset.length !== 1 ? 's' : ''}`;
  }

  function filterSessions() {
    const query = pidSearch.value.trim().toLowerCase();
    if (!query) { populateDropdown(allSessions); return; }
    const filtered = allSessions.filter(s =>
      (s.participantId || '').toLowerCase().includes(query)
    );
    populateDropdown(filtered);
  }

  searchBtn.addEventListener('click', filterSessions);
  pidSearch.addEventListener('keydown', e => { if (e.key === 'Enter') filterSessions(); });
  showAllBtn.addEventListener('click', () => {
    pidSearch.value = '';
    populateDropdown(allSessions);
  });

  // ── Fetch session list on load ────────────────────────────────────────────
  (async () => {
    try {
      const res = await fetch('http://localhost:3000/api/results');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allSessions = await res.json();

      if (allSessions.length === 0) {
        sessionSel.innerHTML = '<option value="">No sessions found</option>';
        searchCount.textContent = '0 sessions';
        return;
      }

      populateDropdown(allSessions);
    } catch {
      errorBanner.style.display = 'block';
      errorBanner.textContent =
        'Could not connect to server. Make sure npm start is running.';
      sessionSel.innerHTML = '<option value="">Could not load sessions</option>';
    }
  })();

  // Initial canvas render (idle state)
  setupPlatforms(0, widthForTrial(0));

})();
</script>
</body>
</html>
